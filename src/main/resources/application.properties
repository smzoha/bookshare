spring.application.name=bookshare
server.port=6001

# Profile
spring.profiles.active=dev

# Database
spring.sql.init.mode=never
spring.jpa.hibernate.ddl-auto=none

# Hibernate/Hikari Configs
spring.jpa.properties.hibernate.order_by.default_null_ordering=LAST
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=10

# Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1

# Message Source
spring.messages.basename=locale/messages

# Multipart
spring.servlet.multipart.max-file-size=10MB

# Compression
server.compression.enabled=true
server.compression.min-response-size=1024
server.compression.mime-types=application/json,application/xml,text/html,text/plain,text/xml

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
management.endpoint.health.show-components=always
management.info.java.enabled=true
management.info.os.enabled=true

# OAuth2
spring.security.oauth2.client.registration.google.scope=openid,email,profile

spring.security.oauth2.client.provider.google.authorization-uri=https://accounts.google.com/o/oauth2/v2/auth
spring.security.oauth2.client.provider.google.token-uri=https://oauth2.googleapis.com/token
spring.security.oauth2.client.provider.google.user-info-uri=https://www.googleapis.com/oauth2/v3/userinfo
spring.security.oauth2.client.provider.google.user-name-attribute=sub

# App Version
spring.application.version=${appVersion}
