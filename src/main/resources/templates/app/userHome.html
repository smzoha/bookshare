<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<div th:fragment="userHome">
    <div class="container my-4">
        <div class="row g-4">
            <aside class="col-lg-3">
                <div class="sidebar">
                    <p class="section-label" th:text="#{label.recently.read}"></p>
                    <div class="d-flex flex-column py-2" th:each="progress : ${readingProgressList}">
                        <div th:replace="~{app/common/bookProgressFragment :: shelfBookRow(${progress.book}, ${progress}, false)}"></div>
                    </div>
                </div>
            </aside>

            <main class="col-lg-9">
                <section class="mb-4">
                    <div id="userFeedContainer"></div>
                </section>

                <section class="mb-4">
                    <p class="section-label" th:text="#{label.featured.books}"></p>
                    <div class="recent-books-slider">
                        <th:block th:each="book : ${featuredBooks}">
                            <div th:replace="~{app/common/bookCardFragment :: bookCard(${book})}"></div>
                        </th:block>
                    </div>
                </section>

                <section class="block-section author-cta-section p-4 text-center" sec:authorize="not hasAnyAuthority('ADMIN', 'MODERATOR')">
                    <h5 th:text="#{label.author.request.book.add}"/>
                    <p th:text="#{label.author.request.book.add.subtitle}"></p>
                    <a th:href="@{/author/bookRequest}" class="btn btn-bookshare" th:text="#{label.add.your.book}" sec:authorize="hasAuthority('AUTHOR')"/>
                    <button id="authorApply" class="btn btn-bookshare" th:text="#{label.apply.author}" sec:authorize="not hasAuthority('AUTHOR')"></button>
                </section>
            </main>
        </div>
    </div>

    <script th:inline="javascript">
        $(function() {
            loadFeed(0);

            $(document).on('click', '.feed-nav-btn', function(e) {
                loadFeed($(e.currentTarget).data('page'));
            });

            $('#authorApply').on('click', function () {
                $.ajax({
                    method: 'POST',
                    url: '/author/apply',
                    beforeSend: () => showLoader(),
                    success: () => {
                        alert('Your request has been successfully placed. Please wait until it is approved.');
                        window.location.href = '/';
                    },
                    error: () => {
                        alert('Your request was not successful. You do not meet the criteria to apply as an author.');
                        console.error('Request failed!');
                    },
                    complete: () => removeLoader()
                });
            });
        });

        function loadFeed(page) {
            $.ajax({
                url: `/feed?page=${page}`,
                method: 'GET',
                beforeSend: () => showLoader(),
                success: function (fragment) {
                    $('#userFeedContainer').html(fragment);
                },
                error: () => console.error('Unable to retrieve feed!'),
                complete: () => removeLoader()
            });
        }
    </script>
</div>
</body>
</html>
