<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="userHome">
    <div class="container my-4">
        <div class="row g-4">
            <aside class="col-lg-3">
                <div class="sidebar">
                    <p class="section-label" th:text="#{label.recently.read}"></p>
                    <div class="d-flex flex-column py-2" th:each="progress : ${readingProgressList}">
                        <div th:replace="~{app/common/bookProgressFragment :: shelfBookRow(${progress.book}, ${progress}, false)}"></div>
                    </div>
                </div>
            </aside>

            <main class="col-lg-9">
                <section class="mb-4">
                    <div id="userFeedContainer"></div>
                </section>

                <section class="mb-4">
                    <p class="section-label" th:text="#{label.featured.books}"></p>
                    <div class="recent-books-slider">
                        <th:block th:each="book : ${featuredBooks}">
                            <div th:replace="~{app/common/bookCardFragment :: bookCard(${book})}"></div>
                        </th:block>
                    </div>
                </section>

                <section class="block-section author-cta-section p-4 text-center">
                    <h5 th:text="#{label.author.request.book.add}"/>
                    <p th:text="#{label.author.request.book.add.subtitle}"></p>
                    <a th:href="@{/book/addRequest}" class="btn btn-bookshare" th:text="#{label.add.your.book}"/>
                </section>
            </main>
        </div>
    </div>

    <script th:inline="javascript">
        $(function() {
            loadFeed(0);

            $(document).on('click', '.feed-nav-btn', function(e) {
                loadFeed($(e.currentTarget).data('page'));
            });
        });

        function loadFeed(page) {
            $.ajax({
                url: `/feed?page=${page}`,
                method: 'GET',
                beforeSend: () => showLoader(),
                success: function (fragment) {
                    $('#userFeedContainer').html(fragment);
                },
                error: () => console.error('Unable to retrieve feed!'),
                complete: () => removeLoader()
            });
        }
    </script>
</div>
</body>
</html>
