<!DOCTYPE html>
<html lang="en" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{base}">
<head>
    <title>Profile</title>
    <style>
        .card {
            border-radius: 12px;
            border: none;
        }
    </style>
</head>

<body>
<div layout:fragment="pageContent">
    <div class="container py-4">
        <div class="card mb-4 shadow-sm">
            <div class="card-body">
                <div class="row align-items-center">
                    <div class="col-auto">
                        <img th:src="@{/image/{id}(id=${login.profilePicture.id})}"
                             class="profile-avatar" alt="Profile Picture" th:if="${login.profilePicture != null}">

                        <img th:src="@{/img/user-avatar.png}"
                             class="profile-avatar" alt="Profile Picture" th:if="${login.profilePicture == null}">
                    </div>

                    <div class="col">
                        <div id="profileInfoContainer">
                            <div th:replace="~{app/profile/profileInfoFragment :: profileInfoFragment}"></div>
                        </div>

                        <p class="text-muted mb-3" th:text="${login.bio}"></p>

                        <div class="row text-center">
                            <div class="col">
                                <h5 id="stat-books" th:text="${totalBooks}"></h5>
                                <small class="text-muted" th:text="#{label.books}"></small>
                            </div>

                            <div class="col">
                                <h5 id="stat-connections" th:text="${connectionsCount}"></h5>
                                <small class="text-muted">Connections</small>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-lg-8">
                <div class="card mb-4 shadow-sm">
                    <div class="card-body">
                        <h5 class="mb-3" th:text="#{label.shelves}"></h5>

                        <div id="default-shelves-list" class="d-flex flex-row flex-wrap gap-2 mb-3">
                            <button type="button"
                                    class="btn btn-bookshare-outline rounded-pill shelf-btn"
                                    th:classappend="${activeShelf.id.equals(shelfEntry.key) ? ' active' : ''}"
                                    th:data-shelf-id="${shelfEntry.key}"
                                    th:each="shelfEntry : ${defaultShelves}">

                                <span th:text="${shelfEntry.value}"></span>
                            </button>
                        </div>

                        <div id="shelves-list" class="d-flex flex-row flex-wrap gap-2 mb-3">
                            <button type="button"
                                    class="btn btn-bookshare-outline rounded-pill shelf-btn"
                                    th:classappend="${activeShelf.id.equals(shelfEntry.key) ? ' active' : ''}"
                                    th:data-shelf-id="${shelfEntry.key}"
                                    th:each="shelfEntry : ${shelves}">

                                <span th:text="${shelfEntry.value}"></span>
                            </button>
                        </div>

                        <hr>

                        <div class="active-shelf-container">
                            <div th:replace="~{app/profile/profileActiveShelfFragment :: activeShelfFragment}"></div>
                        </div>
                    </div>
                </div>

                <div class="card mb-4 shadow-sm">
                    <div class="card-body">
                        <h5 class="mb-3" th:text="#{label.reading.progress}"></h5>
                        <div id="reading-progress">
                            <div class="py-2" th:each="progress : ${readingProgressList}">
                                <div th:replace="~{app/common/bookProgressFragment :: shelfBookRow(${progress.book}, ${progress})}"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-lg-4">
                <div class="card mb-4 shadow-sm">
                    <div class="card-body">
                        <h5 class="mb-3">Activity</h5>
                        <div id="activity-feed"></div>
                    </div>
                </div>

                <div class="card shadow-sm">
                    <div class="card-body">
                        <h5 class="mb-3" th:text="#{label.connections}"></h5>

                        <div id="friends-list" class="row row-cols-3 g-2 text-center">
                            <div class="col" th:each="connection : ${connections}">
                                <a th:href="@{/profile/{handle}(handle=${connection.person2.handle})}" class="text-decoration-none">
                                    <div class="d-flex flex-column align-items-center gap-1">
                                        <img th:src="@{/image/{id}(id=${connection.person2.profilePicture.id})}"
                                             class="profile-avatar"
                                             style="width: 65px !important; height: 65px !important;"
                                             th:alt="${connection.person2.handle}"
                                             th:if="${connection.person2.profilePicture != null}">

                                        <img th:src="@{/img/user-avatar.png}"
                                             class="profile-avatar"
                                             style="width: 65px !important; height: 65px !important;"
                                             th:alt="${connection.person2.handle}"
                                             th:if="${connection.person2.profilePicture == null}">

                                        <span class="small fw-medium text-dark text-truncate w-100"
                                              th:text="|${connection.person2.firstName} ${connection.person2.lastName}|"></span>
                                    </div>
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="text/javascript" th:inline="javascript">
        $(function () {
            const href = $(location).attr('href');
            const handle = href.split('/').pop();

            $('.shelf-btn').on('click', function (e) {
                e.preventDefault();

                let activeShelf = $('.shelf-btn.active');
                let currentShelf = $(e.currentTarget);
                let currentShelfId = currentShelf.data('shelfId');

                $.ajax({
                    url: (handle ? `${handle}` : '') + `/shelf?shelfId=${currentShelfId}`,
                    method: 'GET',
                    success: function (data) {
                        $('.active-shelf-container').html(data);

                        activeShelf.removeClass('active');
                        currentShelf.addClass('active');
                    },
                    error: function () {
                        console.error('Error retrieving shelf information ', currentShelf.data('shelfId'));
                    }
                })
            });

            $(document).on('click', '.send-friend-req-btn, .revoke-friend-req-btn,' +
                ' .accept-friend-req-btn, .decline-friend-req-btn, .remove-friend-btn', function (e) {

                e.preventDefault();
                let action = $(e.currentTarget).data('action');

                $.ajax({
                    url: '/profile/friendRequest',
                    method: 'POST',
                    data: {
                        handle: handle,
                        action: action
                    },
                    beforeSend: () => showLoader(),
                    success: function (data) {
                        data.indexOf('::') !== -1 ? $('body').html(data) : $('#profileInfoContainer').html(data);
                    },
                    error: function () {
                        console.error(`Error performing action ${action} for ${handle}`);
                    },
                    complete: () => removeLoader()
                });
            });
        });
    </script>
</div>
</body>
</html>
